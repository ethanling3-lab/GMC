# Netlify configuration for the GMC CRM.
#
# The Next.js Runtime packages all SSR + API routes into one system function
# called `___netlify-server-handler` (confirmed in the Netlify dashboard →
# Logs & metrics → Functions). Set its timeout to 26s (Pro ceiling) so Claude
# Haiku extraction calls don't get killed at the default 10s.

[functions."___netlify-server-handler"]
  timeout = 26

[functions."*"]
  timeout = 26

# M7.2 — scheduled function pings /api/cron/reminders every hour. Schedule
# is also declared inline via `export const config` in the function file,
# but leaving it here as a fallback / documentation. Requires CRON_SECRET
# env var set in the Netlify project's environment variables.
[functions."cron-reminders"]
  schedule = "@hourly"
  timeout = 60
